services:
  projectwasel21:
    build:
      context: ./ProjectWasel21
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=WaselDb;User Id=sa;Password=StrongPass!123;TrustServerCertificate=True;
    networks:
      - productnetwork
    restart: on-failure

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: StrongPass!123
      ACCEPT_EULA: Y
    ports:
      - "1433:1433"
    volumes:
      - sqlvolume:/var/opt/mssql
    networks:
      - productnetwork

networks:
  productnetwork:

volumes:
  sqlvolume: